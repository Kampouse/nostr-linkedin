<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>NostrLink | Professional Network</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⟠</text></svg>">
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --accent: #10b981;
        --accent-hover: #059669;
        --accent-light: rgba(16,185,129,0.12);
        --accent-glow: rgba(16,185,129,0.25);
        --bg: #0a0a0a;
        --surface: #141414;
        --surface-hover: #1c1c1c;
        --surface-border: #262626;
        --surface-border-light: #333;
        --text: #f5f5f5;
        --text-secondary: #a3a3a3;
        --text-muted: #737373;
        --hover-bg: rgba(255,255,255,0.06);
        --green: #22c55e;
        --radius: 8px;
        --radius-full: 50%;
        --shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 2px 4px rgba(0,0,0,0.4);
        --shadow-hover: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 12px rgba(0,0,0,0.5);
        --max-width: 1128px;
      }

      body {
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        font-size: 14px;
        overflow-x: hidden;
        max-width: 100vw;
      }
      #root { min-height: 100dvh; }
      button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
      input, textarea { font: inherit; }
      img { display: block; max-width: 100%; height: auto; }
      .card { max-width: 100%; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ── Global Nav (LinkedIn top bar) ── */
      .global-nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: var(--surface);
        border-bottom: 1px solid var(--surface-border);
      }
      .global-nav-inner {
        max-width: var(--max-width);
        margin: 0 auto;
        display: flex;
        align-items: center;
        padding: 0 24px;
        height: 52px;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }
      .nav-logo {
        width: 34px;
        height: 34px;
        background: var(--accent);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .nav-search {
        position: relative;
        flex: 0 1 280px;
      }
      .nav-search input {
        width: 100%;
        padding: 8px 12px 8px 36px;
        background: #1a1a1a;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        color: var(--text);
        outline: none;
      }
      .nav-search input:focus {
        background: var(--surface);
        box-shadow: 0 0 0 2px var(--accent-glow);
      }
      .nav-search input::placeholder { color: var(--text-muted); }
      .nav-search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
      }

      .nav-right {
        display: flex;
        align-items: stretch;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        min-width: 60px;
        height: 52px;
        color: var(--text-muted);
        font-size: 12px;
        position: relative;
        transition: color 0.15s;
        text-decoration: none;
        gap: 2px;
      }
      .nav-item:hover { color: var(--text); text-decoration: none; }
      .nav-item.active {
        color: var(--text);
      }
      .nav-item.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
      }
      .nav-item-label {
        font-weight: 400;
        white-space: nowrap;
      }
      .nav-item.active .nav-item-label {
        font-weight: 600;
      }

      /* ── Mobile Bottom Tab Bar ── */
      .mobile-tab-bar {
        display: none;
      }
      @media (max-width: 768px) {
        .mobile-tab-bar {
          display: flex;
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          z-index: 1000;
          background: var(--surface);
          border-top: 1px solid var(--surface-border);
          padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .mobile-tab-item {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 2px;
          padding: 8px 4px 6px;
          color: var(--text-muted);
          font-size: 10px;
          font-weight: 500;
          text-decoration: none;
          min-width: 0;
          transition: color 0.15s;
        }
        .mobile-tab-item:hover { color: var(--text); text-decoration: none; }
        .mobile-tab-item.active { color: var(--text); }
        .mobile-tab-item.active span { font-weight: 700; }
        .mobile-tab-avatar {
          width: 22px;
          height: 22px;
          border-radius: 50%;
          overflow: hidden;
          background: #262626;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 11px;
          font-weight: 700;
          color: var(--surface);
        }
        .mobile-tab-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Hide desktop nav-right on mobile */
        .nav-right { display: none !important; }
        /* Shrink search */
        .nav-search { flex: 1 !important; max-width: none !important; min-width: 0; width: 100%; }
        .nav-search input { width: 100%; box-sizing: border-box; }
        .nav-logo { display: none; }
        .global-nav-inner { padding: 0 12px; }
        .nav-search > div { left: -12px; right: -12px; width: calc(100% + 24px); }
        /* Add bottom padding so content isn't hidden behind tab bar */
        .app-body { padding-bottom: 72px; }
        .profile-body { padding: 12px 16px 16px; }
        .profile-top { flex-direction: column; align-items: center; text-align: center; }
        .profile-avatar-lg { width: 72px; height: 72px; font-size: 28px; margin-top: -36px; }
        .profile-h1 { font-size: 20px; }
        .profile-cta-row { justify-content: center; flex-wrap: wrap; }
        /* Post cards tighter */
        .post-header { padding: 12px 12px 0; }
        .post-content { padding: 8px 12px; }
        .post-actions { margin: 0 4px; }
        .compose-card { padding: 12px; }
      }

      /* ── 3-Column Layout ── */
      .app-body {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 24px 24px 48px;
        display: grid;
        grid-template-columns: 225px 1fr 300px;
        gap: 24px;
        align-items: start;
      }
      .app-body-wide {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 24px 24px 48px;
      }
      @media (max-width: 1024px) {
        .app-body { grid-template-columns: 1fr; max-width: 555px; }
        .app-body-wide { width: 100% !important; max-width: 100% !important; padding: 0 !important; padding-bottom: 72px !important; margin: 0 !important; }
        .sidebar-left, .sidebar-right { display: none; }
      }

      /* ── Cards ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      /* ── Buttons ── */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 14px;
        background: var(--accent);
        color: white;
        border: none;
        transition: background 0.15s;
        text-decoration: none;
      }
      .btn-primary:hover { background: var(--accent-hover); text-decoration: none; }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-primary.full { width: 100%; }

      .btn-outline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 14px;
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
        transition: background 0.15s;
        text-decoration: none;
      }
      .btn-outline:hover { background: var(--accent-light); text-decoration: none; }
      .btn-outline.full { width: 100%; }

      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 14px;
        color: var(--text-muted);
        transition: background 0.15s, color 0.15s;
      }
      .btn-ghost:hover { background: var(--hover-bg); color: var(--text); }

      /* ── Left Sidebar ── */
      .sidebar-left {
        position: sticky;
        top: 76px;
      }
      .profile-card-top {
        height: 56px;
        background: linear-gradient(135deg, #1a3a2a, #0d2618);
      }
      .profile-card-avatar {
        width: 56px;
        height: 56px;
        border-radius: var(--radius-full);
        border: 2px solid var(--surface);
        background: #262626;
        margin: -28px auto 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--surface);
        font-size: 20px;
        font-weight: 600;
      }
      .profile-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .profile-card-body {
        padding: 12px 16px 16px;
        text-align: center;
      }
      .profile-card-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-top: 4px;
      }
      .profile-card-name:hover { color: var(--accent); cursor: pointer; }
      .profile-card-headline {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
        line-height: 1.4;
      }
      .profile-card-divider {
        border: none;
        border-top: 1px solid var(--surface-border);
        margin: 8px 0;
      }
      .profile-card-stat {
        display: flex;
        justify-content: space-between;
        padding: 4px 16px;
        font-size: 12px;
        color: var(--text-muted);
      }
      .profile-card-stat strong { color: var(--accent); font-weight: 600; }

      /* Discovery card */
      .discovery-card {
        padding: 12px 16px;
      }
      .discovery-card h4 {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
      }
      .discovery-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        font-size: 12px;
        color: var(--text-secondary);
        cursor: pointer;
      }
      .discovery-item:hover { color: var(--text); }
      .discovery-dot {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--text-muted);
        flex-shrink: 0;
      }

      /* ── Main Feed ── */
      .main-feed {
        min-width: 0;
      }

      /* Compose */
      .compose-card {
        padding: 16px 20px;
        margin-bottom: 8px;
      }
      .compose-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .compose-avatar {
        width: 52px;
        height: 52px;
        border-radius: var(--radius-full);
        background: #262626;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
      }
      .compose-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .compose-trigger {
        flex: 1;
        padding: 14px 20px;
        border: 1px solid var(--surface-border);
        border-radius: 28px;
        color: var(--text-muted);
        font-size: 15px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: background 0.15s;
      }
      .compose-trigger:hover { background: var(--hover-bg); }
      .compose-actions-bar {
        display: flex;
        justify-content: space-around;
        border-top: 1px solid var(--surface-border);
        margin-top: 12px;
        padding-top: 8px;
      }
      .compose-action-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        transition: background 0.15s;
      }
      .compose-action-btn:hover { background: var(--hover-bg); }

      /* Compose modal */
      .compose-modal {
        padding: 20px;
      }
      .compose-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .compose-modal-header h3 { font-size: 18px; font-weight: 600; }
      .compose-textarea {
        width: 100%;
        min-height: 100px;
        border: none;
        outline: none;
        resize: none;
        font-size: 15px;
        line-height: 1.65;
        color: var(--text);
        background: transparent;
      }
      .compose-textarea::placeholder { color: var(--text-muted); }
      .compose-modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--surface-border);
      }

      /* Post card — LinkedIn style */
      .post-card {
        margin-bottom: 8px;
        overflow: hidden;
      }
      .post-header {
        display: flex;
        gap: 10px;
        padding: 16px 20px 0;
        align-items: flex-start;
        min-width: 0;
        overflow: hidden;
      }
      .post-avatar {
        width: 52px;
        height: 52px;
        border-radius: var(--radius-full);
        background: #262626;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .post-avatar:hover { opacity: 0.8; }
      .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .post-author-info { flex: 1; min-width: 0; }
      .post-author-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        transition: color 0.15s;
        text-decoration: none;
      }
      .post-author-name:hover { color: var(--accent); text-decoration: underline; }
      .post-author-headline {
        font-size: 13px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
      }
      .post-time {
        font-size: 13px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
      }
      .post-content {
        padding: 12px 20px 8px;
        font-size: 15px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text-secondary);
        overflow: hidden;
      }
      .post-content a {
        overflow-wrap: break-word;
        word-break: break-all;
      }
      .post-reactions {
        padding: 8px 20px;
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--text-muted);
      }
      .post-actions {
        display: flex;
        justify-content: space-around;
        border-top: 1px solid var(--surface-border);
        padding: 4px 8px;
        margin: 0 12px;
      }
      .post-action-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 4px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        transition: background 0.15s, color 0.15s;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
      }
      .post-action-btn:hover { background: var(--hover-bg); color: var(--text); }
      .post-action-btn.active { color: var(--accent); }
      .post-action-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .post-action-icon svg {
        width: 18px;
        height: 18px;
      }


      /* ── Right Sidebar ── */
      .sidebar-right {
        position: sticky;
        top: 76px;
      }
      .news-card {
        padding: 12px 16px;
      }
      .news-card-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 12px;
      }
      .news-item {
        padding: 8px 0;
        cursor: pointer;
      }
      .news-item:hover { color: var(--text); }
      .news-item-header {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .news-item-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-top: 2px;
      }
      .news-item-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* ── Profile Page ── */
      .profile-banner {
        height: 196px;
        background: linear-gradient(135deg, #1a3a2a, #0d2618);
        overflow: hidden;
        border-radius: var(--radius) var(--radius) 0 0;
      }
      .profile-banner img { width: 100%; height: 100%; object-fit: cover; }
      .profile-body {
        padding: 16px 24px 24px;
      }
      .profile-top {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      .profile-avatar-lg {
        width: 152px;
        height: 152px;
        border-radius: var(--radius-full);
        border: 4px solid var(--surface);
        background: #262626;
        overflow: hidden;
        margin-top: -80px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--surface);
        font-size: 48px;
        font-weight: 600;
      }
      .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
      .profile-header-info { flex: 1; }
      .profile-h1 { font-size: 28px; font-weight: 400; line-height: 1.3; }
      .profile-headline { font-size: 16px; color: var(--text-secondary); margin-top: 4px; }
      .profile-location { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
      .profile-connections { font-size: 14px; color: var(--accent); font-weight: 600; margin-top: 4px; }
      .profile-cta-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }

      /* ── Profile Page Mobile ── */
      @media (max-width: 768px) {
        .jobs-grid {
          grid-template-columns: 1fr !important;
          padding: 8px 0 !important;
        }
        .jobs-sidebar { display: none !important; }
        .jobs-right { display: none !important; }
        .job-detail-mobile {
          display: block !important;
          position: fixed !important;
          top: 0; left: 0; right: 0; bottom: 0;
          z-index: 9999;
          background: var(--bg);
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
        }
        .profile-grid-2col {
          grid-template-columns: 1fr !important;
          gap: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
          box-sizing: border-box !important;
        }
        .profile-grid-2col > aside {
          display: none !important;
        }
        .profile-top-card-inner {
          padding: 0 16px 16px !important;
        }
        .profile-avatar-wrap {
          width: 96px !important;
          height: 96px !important;
          border-radius: 48px !important;
          margin-top: -48px !important;
          font-size: 36px !important;
          border-width: 3px !important;
        }
        .profile-name-row {
          flex-direction: column !important;
          align-items: flex-start !important;
          gap: 8px !important;
        }
        .profile-name-row > div:first-child {
          width: 100%;
        }
        .profile-name-row .profile-btns {
          margin-left: 0 !important;
          width: 100%;
        }
        .profile-name-row .profile-btns > div,
        .profile-name-row .profile-btns > a,
        .profile-name-row .profile-btns > button {
          flex: 1;
        }
        .profile-name-h2 {
          font-size: 22px !important;
        }
        .profile-grid-2col .card {
          border-radius: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
          overflow: hidden !important;
        }
        /* Tighter card padding on mobile */
        .profile-grid-2col > div > .card:not(:first-child) {
          padding-left: 16px !important;
          padding-right: 16px !important;
        }
        .profile-banner {
          aspect-ratio: 16 / 9 !important;
          width: 100% !important;
          background-size: cover !important;
        }
      }

      /* Edit form */
      .edit-card { padding: 24px; }
      .edit-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
      .field { margin-bottom: 16px; }
      .field label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
      .field input, .field textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--surface-border);
        border-radius: 4px;
        font-size: 14px;
        background: var(--surface-hover);
        color: var(--text);
        box-sizing: border-box;
      }
      .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

      /* Clickable elements */
      .profile-card-name { cursor: pointer; }
      .profile-card-name:hover { color: var(--accent); text-decoration: underline; }
      .profile-card-avatar { cursor: pointer; transition: opacity 0.15s; }
      .profile-card-avatar:hover { opacity: 0.8; }

      /* Profile page */
      .profile-banner { height: 160px; border-radius: 8px 8px 0 0; overflow: hidden; background: linear-gradient(135deg, #064e3b, #065f46, #047857); }
      .profile-banner img { width: 100%; height: 100%; object-fit: cover; }
      .profile-avatar-lg { width: 96px; height: 96px; border-radius: 50%; border: 3px solid var(--surface); margin-top: -48px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; flex-shrink: 0; }
      .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
      .profile-h1 { font-size: 22px; font-weight: 700; margin: 0; }
      .profile-headline { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
      .profile-location { font-size: 13px; color: var(--text-muted); }
      .profile-location a { color: var(--accent); text-decoration: none; }
      .profile-location a:hover { text-decoration: underline; }
      .profile-cta-row { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
      .connection-item:hover { background: var(--surface-hover); border-radius: 8px; }
      .field textarea { resize: vertical; }

      /* ── Jobs Page ── */
      .jobs-header {
        padding: 24px;
        text-align: center;
        border-bottom: 1px solid var(--surface-border);
      }
      .jobs-header h2 { font-size: 22px; font-weight: 600; }
      .job-card-item { padding: 16px; border-bottom: 1px solid var(--surface-border); cursor: pointer; transition: background 0.15s; }
      .job-card-item:last-child { border-bottom: none; }
      .job-card-item:hover { background: var(--hover-bg); }
      .job-card-title { font-size: 16px; font-weight: 600; color: var(--accent); }
      .job-card-company { font-size: 14px; color: var(--text); margin-top: 2px; }
      .job-card-location { font-size: 14px; color: var(--text-muted); }
      .job-card-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
      .job-tag {
        padding: 2px 8px;
        border: 1px solid var(--accent);
        border-radius: 12px;
        font-size: 12px;
        color: var(--accent);
        font-weight: 500;
      }

      .jobs-grid {
        display: grid;
        grid-template-columns: 240px 1fr 340px;
        gap: 0 16px;
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 16px 24px;
        align-items: start;
      }
      .jobs-sidebar { position: sticky; top: 72px; }
      .jobs-right { position: sticky; top: 72px; }
      .job-detail-mobile { display: none; }

      .profile-grid-2col {
        max-width: 800px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 20px;
        align-items: start;
      }
      .profile-grid-2col > div {
        min-width: 0;
      }

      /* ── Network Page ── */
      .network-header {
        padding: 24px;
        border-bottom: 1px solid var(--surface-border);
      }
      .network-header h2 { font-size: 22px; font-weight: 600; }
      .connection-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 8px;
        padding: 16px;
      }
      .connection-item {
        padding: 12px;
        display: flex;
        gap: 12px;
        align-items: center;
        transition: background 0.15s;
        cursor: pointer;
      }
      .connection-item:hover { background: var(--hover-bg); }
      .connection-avatar {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-full);
        background: #262626;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--surface);
        font-size: 16px;
        font-weight: 600;
      }
      .connection-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .connection-name { font-size: 14px; font-weight: 600; color: var(--text); }
      .connection-headline { font-size: 12px; color: var(--text-muted); }

      /* ── Login Screen ── */
      .login-page {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        background: var(--surface);
      }
      .login-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px;
        max-width: var(--max-width);
        margin: 0 auto;
        width: 100%;
      }
      .login-nav-logo {
        width: 34px;
        height: 34px;
        background: var(--accent);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        font-weight: 700;
      }
      .login-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }
      .login-box {
        max-width: 400px;
        width: 100%;
      }
      .login-box h1 { font-size: 32px; font-weight: 400; color: var(--text); margin-bottom: 8px; }
      .login-box .login-sub { font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; }
      .login-box .error-bar {
        background: #2a1010;
        color: #ef4444;
        padding: 10px 14px;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 16px;
        border: 1px solid #4a1515;
      }
      .login-connect-btn {
        width: 100%;
        padding: 12px;
        border-radius: 28px;
        background: var(--accent);
        color: white;
        font-size: 16px;
        font-weight: 600;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s;
      }
      .login-connect-btn:hover { background: var(--accent-hover); }
      .login-connect-btn:disabled { opacity: 0.5; }
      .login-hint {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 16px;
        text-align: center;
        line-height: 1.6;
      }

      .qr-screen {
        text-align: center;
      }
      .qr-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
      .qr-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
      .qr-wrapper {
        display: inline-block;
        padding: 16px;
        border: 1px solid var(--surface-border);
        border-radius: var(--radius);
        margin-bottom: 16px;
      }
      .qr-actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }

      /* ── Login tabs ── */
      .login-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--surface-border);
        padding-bottom: 0;
      }
      .login-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        margin-bottom: -1px;
      }
      .login-tab:hover { color: var(--text); }
      .login-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      .login-method { margin-bottom: 16px; }
      .login-method-desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .key-input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .key-input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid var(--surface-border);
        border-radius: 4px;
        font-size: 14px;
        font-family: monospace;
        color: var(--text);
        background: var(--surface);
        outline: none;
      }
      .key-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
      .key-input::placeholder { color: var(--text-muted); }
      .key-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
        color: var(--text-muted);
        border: 1px solid var(--surface-border);
        border-radius: 4px;
        transition: color 0.15s;
      }
      .key-toggle:hover { color: var(--text); }

      /* ── Shared ── */
      .loading-state { text-align: center; padding: 40px 16px; color: var(--text-muted); }
      .empty-state { text-align: center; padding: 48px 16px; }
      .empty-state p { color: var(--text-muted); margin-top: 8px; font-size: 14px; }
      .empty-state .muted { font-size: 12px; }
      .post-action-btn.active { color: var(--accent); }
      .reply-box { padding: 12px 16px; border-top: 1px solid var(--surface-border); }
      .reply-textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--surface-border); border-radius: 6px; background: var(--surface-hover); color: var(--text); font-size: 13px; resize: none; min-height: 48px; box-sizing: border-box; outline: none; }
      .reply-textarea:focus { border-color: var(--accent); }

      /* Spinner for uploads */
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shimmer { to { background-position: -200% 0; } }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); } 70% { box-shadow: 0 0 0 12px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
      @keyframes status-dots { 0%, 20% { opacity: 0; } 40% { opacity: 1; } 100% { opacity: 0; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
      .spin { animation: spin 1s linear infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
